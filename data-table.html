<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>프로젝트 현황 대시보드</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 40px 20px;
      color: #1a1a2e;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: 26px;
      font-weight: 700;
      color: #1a1a2e;
      letter-spacing: -0.5px;
    }

    .header p {
      margin-top: 6px;
      font-size: 14px;
      color: #6b7280;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.07);
      overflow: hidden;
    }

    .card-header {
      padding: 20px 28px;
      border-bottom: 1px solid #f0f2f5;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-header .dot {
      width: 8px;
      height: 8px;
      background: #6366f1;
      border-radius: 50%;
    }

    .card-header span {
      font-size: 15px;
      font-weight: 600;
      color: #374151;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      background: #f8f9fb;
      padding: 14px 24px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #9ca3af;
    }

    tbody tr {
      border-top: 1px solid #f0f2f5;
      transition: background 0.15s;
    }

    tbody tr:hover {
      background: #fafbff;
    }

    tbody td {
      padding: 16px 24px;
      font-size: 14px;
      color: #374151;
    }

    .num {
      font-weight: 600;
      color: #9ca3af;
      width: 60px;
    }

    .project-name {
      font-weight: 600;
      color: #1a1a2e;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .badge-progress {
      background: #eff6ff;
      color: #3b82f6;
    }
    .badge-progress::before { background: #3b82f6; }

    .badge-done {
      background: #f0fdf4;
      color: #16a34a;
    }
    .badge-done::before { background: #16a34a; }

    .badge-hold {
      background: #fff7ed;
      color: #ea580c;
    }
    .badge-hold::before { background: #ea580c; }

    .badge-review {
      background: #faf5ff;
      color: #9333ea;
    }
    .badge-review::before { background: #9333ea; }

    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .progress-bar {
      flex: 1;
      height: 6px;
      background: #f0f2f5;
      border-radius: 99px;
      overflow: hidden;
      min-width: 80px;
    }

    .progress-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #6366f1, #818cf8);
      transition: width 0.4s ease;
    }

    .progress-fill.high   { background: linear-gradient(90deg, #16a34a, #4ade80); }
    .progress-fill.mid    { background: linear-gradient(90deg, #6366f1, #818cf8); }
    .progress-fill.low    { background: linear-gradient(90deg, #ea580c, #fb923c); }

    .progress-label {
      font-size: 13px;
      font-weight: 600;
      color: #6b7280;
      width: 34px;
      text-align: right;
    }

    .footer {
      margin-top: 16px;
      text-align: right;
      font-size: 12px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>프로젝트 현황 대시보드</h1>
      <p>전체 프로젝트의 진행 현황을 한눈에 확인합니다.</p>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="dot"></div>
        <span>프로젝트 목록</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>번호</th>
            <th>프로젝트명</th>
            <th>담당자</th>
            <th>상태</th>
            <th>완료율</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="num">01</td>
            <td class="project-name">쇼핑몰 리뉴얼</td>
            <td>김지수</td>
            <td><span class="badge badge-progress">진행 중</span></td>
            <td>
              <div class="progress-wrap">
                <div class="progress-bar"><div class="progress-fill mid" style="width:72%"></div></div>
                <span class="progress-label">72%</span>
              </div>
            </td>
          </tr>
          <tr>
            <td class="num">02</td>
            <td class="project-name">사내 인트라넷 구축</td>
            <td>박민준</td>
            <td><span class="badge badge-done">완료</span></td>
            <td>
              <div class="progress-wrap">
                <div class="progress-bar"><div class="progress-fill high" style="width:100%"></div></div>
                <span class="progress-label">100%</span>
              </div>
            </td>
          </tr>
          <tr>
            <td class="num">03</td>
            <td class="project-name">모바일 앱 고도화</td>
            <td>이서연</td>
            <td><span class="badge badge-review">검토 중</span></td>
            <td>
              <div class="progress-wrap">
                <div class="progress-bar"><div class="progress-fill mid" style="width:55%"></div></div>
                <span class="progress-label">55%</span>
              </div>
            </td>
          </tr>
          <tr>
            <td class="num">04</td>
            <td class="project-name">데이터 분석 플랫폼</td>
            <td>최도윤</td>
            <td><span class="badge badge-hold">보류</span></td>
            <td>
              <div class="progress-wrap">
                <div class="progress-bar"><div class="progress-fill low" style="width:20%"></div></div>
                <span class="progress-label">20%</span>
              </div>
            </td>
          </tr>
          <tr>
            <td class="num">05</td>
            <td class="project-name">AI 챗봇 도입</td>
            <td>한예린</td>
            <td><span class="badge badge-progress">진행 중</span></td>
            <td>
              <div class="progress-wrap">
                <div class="progress-bar"><div class="progress-fill mid" style="width:88%"></div></div>
                <span class="progress-label">88%</span>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="footer">마지막 업데이트: 2026년 4월 30일</div>
  </div>
</body>
</html>
