<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TAS 업무 관리</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4f8;
      color: #2d3748;
      min-height: 100vh;
      padding: 32px 16px;
    }

    .container { max-width: 900px; margin: 0 auto; }

    /* ── 헤더 ── */
    header { text-align: center; margin-bottom: 32px; }
    header h1 { font-size: 2rem; font-weight: 700; color: #1a202c; letter-spacing: -.5px; }
    header p  { color: #718096; margin-top: 6px; font-size: .95rem; }

    /* ── 요약 카드 (전체/완료/진행) ── */
    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: #fff;
      border-radius: 14px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.07);
    }
    .stat-card .num   { font-size: 2rem; font-weight: 700; color: #3b82f6; }
    .stat-card .label { font-size: .8rem; color: #a0aec0; margin-top: 4px; text-transform: uppercase; letter-spacing: .5px; }

    /* ── 진행률 바 ── */
    .progress-section {
      background: #fff;
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,.07);
    }
    .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .progress-header span:first-child { font-weight: 600; font-size: .9rem; }
    .progress-header .pct { font-weight: 700; color: #3b82f6; }
    .bar-track { background: #e2e8f0; border-radius: 999px; height: 12px; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #3b82f6, #60a5fa); transition: width .4s ease; }

    /* ── 카테고리별 완료율 ── */
    .cat-stats-section {
      background: #fff;
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,.07);
    }
    .cat-stats-section h3 { font-size: .9rem; font-weight: 600; color: #4a5568; margin-bottom: 14px; }
    .cat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }
    .cat-card {
      background: #f7fafc;
      border-radius: 10px;
      padding: 12px 14px;
      border: 1.5px solid #e2e8f0;
    }
    .cat-card .cat-name {
      font-size: .78rem;
      font-weight: 700;
      color: #4a5568;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cat-card .cat-ratio {
      font-size: .72rem;
      color: #718096;
      margin-bottom: 6px;
    }
    .cat-bar-track { background: #e2e8f0; border-radius: 999px; height: 6px; overflow: hidden; }
    .cat-bar-fill  { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #3b82f6, #60a5fa); transition: width .4s ease; }
    .cat-pct { font-size: .78rem; font-weight: 700; color: #3b82f6; margin-top: 4px; }

    /* ── 필터 바 ── */
    .filter-section {
      background: #fff;
      border-radius: 14px;
      padding: 16px 20px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,.07);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .filter-group { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .filter-group-label { font-size: .72rem; font-weight: 700; color: #a0aec0; text-transform: uppercase; letter-spacing: .4px; margin-right: 2px; }
    .filter-divider { width: 1px; height: 24px; background: #e2e8f0; }

    .filter-btn {
      padding: 5px 14px;
      border-radius: 999px;
      border: 1.5px solid #e2e8f0;
      background: #f7fafc;
      font-size: .8rem;
      font-weight: 600;
      color: #718096;
      cursor: pointer;
      transition: all .15s;
    }
    .filter-btn:hover { border-color: #3b82f6; color: #3b82f6; }
    .filter-btn.active {
      background: #3b82f6;
      border-color: #3b82f6;
      color: #fff;
    }
    .filter-btn.active.p-high   { background: #ef4444; border-color: #ef4444; }
    .filter-btn.active.p-medium { background: #f59e0b; border-color: #f59e0b; }
    .filter-btn.active.p-low    { background: #22c55e; border-color: #22c55e; }

    /* ── 입력 폼 ── */
    .form-card { background: #fff; border-radius: 14px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,.07); }
    .form-card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; color: #4a5568; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-grid .full { grid-column: 1 / -1; }

    label { display: block; font-size: .78rem; font-weight: 600; color: #718096; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .4px; }
    input, select {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid #e2e8f0; border-radius: 9px;
      font-size: .9rem; color: #2d3748; background: #f7fafc;
      transition: border-color .2s; outline: none;
    }
    input:focus, select:focus { border-color: #3b82f6; background: #fff; }

    .btn-add {
      width: 100%; padding: 12px;
      background: #3b82f6; color: #fff;
      font-size: .95rem; font-weight: 600;
      border: none; border-radius: 10px; cursor: pointer; margin-top: 4px;
      transition: background .2s, transform .1s;
    }
    .btn-add:hover  { background: #2563eb; }
    .btn-add:active { transform: scale(.98); }

    /* ── 업무 카드 ── */
    .task-list { display: flex; flex-direction: column; gap: 12px; }
    .task-list > h2 { font-size: 1rem; font-weight: 600; color: #4a5568; margin-bottom: 4px; }

    .task-card {
      background: #fff; border-radius: 14px;
      padding: 18px 20px; display: flex; align-items: flex-start; gap: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,.07);
      border-left: 5px solid transparent;
      transition: opacity .25s, box-shadow .2s;
    }
    .task-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.11); }
    .task-card.done  { opacity: .42; }

    .priority-high   { border-left-color: #ef4444; }
    .priority-medium { border-left-color: #f59e0b; }
    .priority-low    { border-left-color: #22c55e; }

    /* 체크박스 */
    .task-check {
      appearance: none; width: 20px; height: 20px;
      border: 2px solid #cbd5e0; border-radius: 6px;
      cursor: pointer; flex-shrink: 0; margin-top: 2px;
      transition: background .2s, border-color .2s; position: relative;
    }
    .task-check:checked { background: #3b82f6; border-color: #3b82f6; }
    .task-check:checked::after {
      content: ''; position: absolute;
      left: 4px; top: 1px; width: 8px; height: 12px;
      border: 2.5px solid #fff; border-top: none; border-left: none;
      transform: rotate(45deg);
    }

    .task-body { flex: 1; min-width: 0; }
    .task-title {
      font-weight: 600; font-size: .97rem; color: #2d3748;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .task-card.done .task-title { text-decoration: line-through; color: #a0aec0; }

    .task-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
    .meta-tag  { font-size: .75rem; padding: 2px 9px; border-radius: 999px; font-weight: 500; }

    .meta-assignee { background: #ebf4ff; color: #3b82f6; }
    .meta-due      { background: #f0fff4; color: #38a169; }
    .meta-due.urgent { background: #fff5f5; color: #ef4444; font-weight: 700; }
    .meta-category { background: #f3f0ff; color: #7c3aed; }

    .priority-badge-high   { background: #fff5f5; color: #ef4444; }
    .priority-badge-medium { background: #fffbeb; color: #d97706; }
    .priority-badge-low    { background: #f0fdf4; color: #16a34a; }

    /* 마감 경고 배너 */
    .deadline-warning {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: .72rem; font-weight: 700;
      padding: 2px 10px; border-radius: 999px;
      background: #ef4444; color: #fff;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .65; }
    }

    .btn-delete {
      background: none; border: none; cursor: pointer;
      color: #cbd5e0; font-size: 1.2rem; padding: 4px;
      border-radius: 6px; transition: color .2s, background .2s; flex-shrink: 0;
    }
    .btn-delete:hover { color: #ef4444; background: #fff5f5; }

    .empty-msg { text-align: center; color: #a0aec0; font-size: .9rem; padding: 32px 0; }

    /* ── 날짜 입력 그룹 ── */
    .date-field-wrap { position: relative; }
    .date-field-group {
      display: flex; align-items: center; gap: 4px;
      padding: 8px 14px;
      border: 1.5px solid #e2e8f0; border-radius: 9px;
      background: #f7fafc; transition: border-color .2s;
      cursor: text;
    }
    .date-field-group:focus-within { border-color: #3b82f6; background: #fff; }
    .date-field-group.error { border-color: #ef4444; }
    .date-seg {
      border: none; outline: none; background: transparent;
      font-size: .9rem; color: #2d3748; text-align: center; padding: 2px 0;
    }
    .date-seg::placeholder { color: #cbd5e0; }
    .date-seg-y { width: 46px; }
    .date-seg-m { width: 28px; }
    .date-seg-d { width: 28px; }
    .date-sep { color: #a0aec0; font-weight: 600; user-select: none; line-height: 1; }
    .date-error { font-size: .74rem; color: #ef4444; margin-top: 5px; display: none; }
    .date-error.show { display: block; }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-grid .full { grid-column: 1; }
      .cat-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .home-btn {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 9999;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #0d1b3e;
      color: #93c5fd;
      border: 1px solid #1e3a8a;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s, color 0.2s, transform 0.2s;
    }
    .home-btn:hover {
      background: #112266;
      color: #bfdbfe;
      transform: translateX(-2px);
    }
  </style>
</head>
<body>
<a class="home-btn" href="index.html">← 홈으로</a>
<div class="container">

  <header>
    <h1>TAS 업무 관리</h1>
    <p>Task Assignment System — 업무를 추가하고 진행 상황을 추적하세요</p>
  </header>

  <!-- 전체 요약 -->
  <div class="summary">
    <div class="stat-card">
      <div class="num" id="totalCount">0</div>
      <div class="label">전체 업무</div>
    </div>
    <div class="stat-card">
      <div class="num" id="doneCount">0</div>
      <div class="label">완료 업무</div>
    </div>
    <div class="stat-card">
      <div class="num" id="pendingCount">0</div>
      <div class="label">진행 중</div>
    </div>
  </div>

  <!-- 전체 진행률 -->
  <div class="progress-section">
    <div class="progress-header">
      <span>전체 진행률</span>
      <span class="pct" id="pctText">0%</span>
    </div>
    <div class="bar-track">
      <div class="bar-fill" id="barFill" style="width:0%"></div>
    </div>
  </div>

  <!-- 카테고리별 완료율 -->
  <div class="cat-stats-section">
    <h3>카테고리별 완료율</h3>
    <div class="cat-grid" id="catGrid"></div>
  </div>

  <!-- 필터 -->
  <div class="filter-section">
    <div class="filter-group">
      <span class="filter-group-label">상태</span>
      <button class="filter-btn active" data-filter="all"     onclick="setFilter('all')">전체</button>
      <button class="filter-btn"        data-filter="done"    onclick="setFilter('done')">완료</button>
      <button class="filter-btn"        data-filter="pending" onclick="setFilter('pending')">미완료</button>
    </div>
    <div class="filter-divider"></div>
    <div class="filter-group">
      <span class="filter-group-label">우선순위</span>
      <button class="filter-btn p-high"   data-filter="high"   onclick="setFilter('high')">높음</button>
      <button class="filter-btn p-medium" data-filter="medium" onclick="setFilter('medium')">보통</button>
      <button class="filter-btn p-low"    data-filter="low"    onclick="setFilter('low')">낮음</button>
    </div>
  </div>

  <!-- 입력 폼 -->
  <div class="form-card">
    <h2>+ 새 업무 추가</h2>
    <div class="form-grid">
      <div class="full">
        <label for="taskName">업무명</label>
        <input id="taskName" type="text" placeholder="예) 월별 손익 보고서 작성" />
      </div>
      <div>
        <label for="assignee">담당자</label>
        <input id="assignee" type="text" placeholder="예) 홍길동" />
      </div>
      <div>
        <label>마감일</label>
        <div class="date-field-wrap">
          <div class="date-field-group" id="dateGroup">
            <input class="date-seg date-seg-y" id="dateYear"  inputmode="numeric" maxlength="4" placeholder="YYYY" autocomplete="off" />
            <span class="date-sep">-</span>
            <input class="date-seg date-seg-m" id="dateMonth" inputmode="numeric" maxlength="2" placeholder="MM"   autocomplete="off" />
            <span class="date-sep">-</span>
            <input class="date-seg date-seg-d" id="dateDay"   inputmode="numeric" maxlength="2" placeholder="DD"   autocomplete="off" />
          </div>
          <div class="date-error" id="dateError"></div>
        </div>
      </div>
      <div>
        <label for="priority">우선순위</label>
        <select id="priority">
          <option value="high">높음</option>
          <option value="medium" selected>보통</option>
          <option value="low">낮음</option>
        </select>
      </div>
      <div>
        <label for="category">카테고리</label>
        <select id="category">
          <option value="ERP">ERP</option>
          <option value="MIS">MIS</option>
          <option value="Network Security">Network Security</option>
          <option value="AI Platform">AI Platform</option>
          <option value="Digital Twin">Digital Twin</option>
          <option value="탱크팜 AI 운영 지원 시스템">탱크팜 AI 운영 지원 시스템</option>
          <option value="기타">기타</option>
        </select>
      </div>
      <div class="full">
        <button class="btn-add" onclick="addTask()">업무 추가</button>
      </div>
    </div>
  </div>

  <!-- 업무 목록 -->
  <div class="task-list">
    <h2 id="listHeading">업무 목록</h2>
    <div id="taskContainer">
      <p class="empty-msg" id="emptyMsg" style="display:none">해당하는 업무가 없습니다.</p>
    </div>
  </div>

</div>

<script>
  const PRIORITY_LABEL = { high: '높음', medium: '보통', low: '낮음' };
  const CATEGORIES = ['ERP','MIS','Network Security','AI Platform','Digital Twin','탱크팜 AI 운영 지원 시스템','기타'];

  let activeFilter = 'all';

  let tasks = [
    {
      id: 1,
      name: '월별 손익계산서 작성 및 검토',
      assignee: '김재무',
      priority: 'high',
      category: 'ERP',
      due: '2026-05-02',
      done: false
    },
    {
      id: 2,
      name: '분기 예산 대비 실적 분석 보고서',
      assignee: '이분석',
      priority: 'medium',
      category: 'MIS',
      due: '2026-05-20',
      done: false
    },
    {
      id: 3,
      name: '비용 항목 분류 코드 업데이트',
      assignee: '박회계',
      priority: 'low',
      category: 'ERP',
      due: '2026-05-31',
      done: true
    }
  ];

  /* ── 필터 ── */
  function setFilter(f) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.filter === f);
    });
    render();
  }

  function filteredTasks() {
    return tasks.filter(t => {
      if (activeFilter === 'done')    return t.done;
      if (activeFilter === 'pending') return !t.done;
      if (activeFilter === 'high')    return t.priority === 'high';
      if (activeFilter === 'medium')  return t.priority === 'medium';
      if (activeFilter === 'low')     return t.priority === 'low';
      return true;
    });
  }

  /* ── 마감 임박 판단 (오늘 기준 3일 이내) ── */
  function daysUntil(due) {
    if (!due) return null;
    const today = new Date(); today.setHours(0,0,0,0);
    const d     = new Date(due + 'T00:00:00');
    return Math.ceil((d - today) / 86400000);
  }

  /* ── 렌더 ── */
  function render() {
    const container = document.getElementById('taskContainer');
    const emptyMsg  = document.getElementById('emptyMsg');

    Array.from(container.children).forEach(el => { if (!el.id) container.removeChild(el); });

    const visible = filteredTasks();
    if (visible.length === 0) {
      emptyMsg.style.display = 'block';
    } else {
      emptyMsg.style.display = 'none';
      visible.forEach(t => container.appendChild(buildCard(t)));
    }

    updateStats();
    renderCatStats();
  }

  function buildCard(t) {
    const card = document.createElement('div');
    card.className = `task-card priority-${t.priority}${t.done ? ' done' : ''}`;
    card.dataset.id = t.id;

    const days = daysUntil(t.due);
    const dueFmt = t.due
      ? new Date(t.due + 'T00:00:00').toLocaleDateString('ko-KR', { year:'numeric', month:'short', day:'numeric' })
      : '—';

    const isUrgent = !t.done && days !== null && days >= 0 && days <= 3;
    const isOver   = !t.done && days !== null && days < 0;

    let warningBadge = '';
    if (isOver)   warningBadge = `<span class="deadline-warning">⚠️ 기한 초과</span>`;
    else if (isUrgent) warningBadge = `<span class="deadline-warning">⚠️ D-${days === 0 ? 'Day' : days}</span>`;

    const dueClass = (isUrgent || isOver) ? 'meta-due urgent' : 'meta-due';

    card.innerHTML = `
      <input type="checkbox" class="task-check" ${t.done ? 'checked' : ''}
             onchange="toggleDone(${t.id})" title="완료 표시" />
      <div class="task-body">
        <div class="task-title">${escHtml(t.name)}</div>
        <div class="task-meta">
          <span class="meta-tag meta-assignee">👤 ${escHtml(t.assignee)}</span>
          <span class="meta-tag ${dueClass}">📅 ${dueFmt}</span>
          <span class="meta-tag meta-category">🗂 ${escHtml(t.category || '기타')}</span>
          <span class="meta-tag priority-badge-${t.priority}">
            ${t.priority === 'high' ? '🔴' : t.priority === 'medium' ? '🟡' : '🟢'}
            ${PRIORITY_LABEL[t.priority]}
          </span>
          ${warningBadge}
        </div>
      </div>
      <button class="btn-delete" onclick="deleteTask(${t.id})" title="삭제">✕</button>
    `;
    return card;
  }

  /* ── 전체 통계 ── */
  function updateStats() {
    const total   = tasks.length;
    const done    = tasks.filter(t => t.done).length;
    const pending = total - done;
    const pct     = total === 0 ? 0 : Math.round((done / total) * 100);

    document.getElementById('totalCount').textContent   = total;
    document.getElementById('doneCount').textContent    = done;
    document.getElementById('pendingCount').textContent = pending;
    document.getElementById('pctText').textContent      = pct + '%';
    document.getElementById('barFill').style.width      = pct + '%';
    document.getElementById('listHeading').textContent  =
      activeFilter === 'all'
        ? `업무 목록 (${total}건)`
        : `업무 목록 — 필터: ${filterLabel(activeFilter)} (${filteredTasks().length}건)`;
  }

  function filterLabel(f) {
    const map = { all:'전체', done:'완료', pending:'미완료', high:'높음', medium:'보통', low:'낮음' };
    return map[f] || f;
  }

  /* ── 카테고리별 완료율 ── */
  function renderCatStats() {
    const grid = document.getElementById('catGrid');
    grid.innerHTML = '';

    const usedCats = [...new Set(tasks.map(t => t.category || '기타'))];

    if (usedCats.length === 0) {
      grid.innerHTML = '<span style="color:#a0aec0;font-size:.85rem">등록된 업무가 없습니다.</span>';
      return;
    }

    usedCats.forEach(cat => {
      const catTasks = tasks.filter(t => (t.category || '기타') === cat);
      const total    = catTasks.length;
      const done     = catTasks.filter(t => t.done).length;
      const pct      = total === 0 ? 0 : Math.round((done / total) * 100);

      const card = document.createElement('div');
      card.className = 'cat-card';
      card.innerHTML = `
        <div class="cat-name" title="${escHtml(cat)}">${escHtml(cat)}</div>
        <div class="cat-ratio">${done} / ${total} 완료</div>
        <div class="cat-bar-track">
          <div class="cat-bar-fill" style="width:${pct}%"></div>
        </div>
        <div class="cat-pct">${pct}%</div>
      `;
      grid.appendChild(card);
    });
  }

  /* ── 날짜 입력 초기화 ── */
  function initDateInput() {
    const y = document.getElementById('dateYear');
    const m = document.getElementById('dateMonth');
    const d = document.getElementById('dateDay');

    function digitsOnly(e) {
      if (!/^\d$/.test(e.key) && !['Backspace','Delete','Tab','Enter','ArrowLeft','ArrowRight'].includes(e.key)) {
        e.preventDefault();
      }
    }

    y.addEventListener('keydown', digitsOnly);
    m.addEventListener('keydown', digitsOnly);
    d.addEventListener('keydown', digitsOnly);

    // 월 필드: 백스페이스로 연도 필드 복귀
    m.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && m.value === '') {
        e.preventDefault();
        y.focus();
        y.setSelectionRange(y.value.length, y.value.length);
      }
    });

    // 일 필드: 백스페이스로 월 필드 복귀
    d.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && d.value === '') {
        e.preventDefault();
        m.focus();
        m.setSelectionRange(m.value.length, m.value.length);
      }
    });

    y.addEventListener('input', () => {
      y.value = y.value.replace(/\D/g, '').slice(0, 4);
      if (y.value.length === 4) m.focus();
      validateDateInput();
    });

    m.addEventListener('input', () => {
      m.value = m.value.replace(/\D/g, '').slice(0, 2);
      const v = parseInt(m.value, 10);
      // 첫 자리가 2~9면 단월 확정 → '0X'로 패딩 후 일 필드로 이동
      if (m.value.length === 1 && v >= 2) {
        m.value = '0' + m.value;
        d.focus();
      } else if (m.value.length === 2) {
        d.focus();
      }
      validateDateInput();
    });

    d.addEventListener('input', () => {
      d.value = d.value.replace(/\D/g, '').slice(0, 2);
      const v = parseInt(d.value, 10);
      // 첫 자리가 4~9면 단일 확정 → '0X'로 패딩
      if (d.value.length === 1 && v >= 4) {
        d.value = '0' + d.value;
      }
      validateDateInput();
    });
  }

  function validateDateInput() {
    const yv = document.getElementById('dateYear').value;
    const mv = document.getElementById('dateMonth').value;
    const dv = document.getElementById('dateDay').value;
    const group = document.getElementById('dateGroup');
    const err   = document.getElementById('dateError');

    // 세 필드가 모두 채워졌을 때만 검증
    if (yv.length < 4 || !mv || !dv) {
      group.classList.remove('error');
      err.classList.remove('show');
      err.textContent = '';
      return true;
    }

    const y  = parseInt(yv, 10);
    const mo = parseInt(mv, 10);
    const day = parseInt(dv, 10);

    let msg = '';
    if (mo < 1 || mo > 12) {
      msg = `월은 01~12 사이여야 합니다. (입력값: ${mv})`;
    } else {
      const check = new Date(y, mo - 1, day);
      if (check.getFullYear() !== y || check.getMonth() !== mo - 1 || check.getDate() !== day) {
        const maxDay = new Date(y, mo, 0).getDate();
        msg = `${y}년 ${mo}월은 최대 ${maxDay}일까지 있습니다. (입력값: ${dv}일)`;
      }
    }

    const invalid = msg !== '';
    group.classList.toggle('error', invalid);
    err.classList.toggle('show', invalid);
    err.textContent = msg;
    return !invalid;
  }

  function getDueDate() {
    const yv = document.getElementById('dateYear').value;
    const mv = document.getElementById('dateMonth').value.padStart(2, '0');
    const dv = document.getElementById('dateDay').value.padStart(2, '0');
    if (!yv || !mv || !dv) return '';
    return `${yv}-${mv}-${dv}`;
  }

  function clearDateInput() {
    ['dateYear','dateMonth','dateDay'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('dateGroup').classList.remove('error');
    document.getElementById('dateError').classList.remove('show');
    document.getElementById('dateError').textContent = '';
  }

  /* ── 업무 추가 ── */
  function addTask() {
    const name     = document.getElementById('taskName').value.trim();
    const assignee = document.getElementById('assignee').value.trim();
    const priority = document.getElementById('priority').value;
    const category = document.getElementById('category').value;

    if (!name)     { alert('업무명을 입력해 주세요.'); document.getElementById('taskName').focus(); return; }
    if (!assignee) { alert('담당자를 입력해 주세요.'); document.getElementById('assignee').focus(); return; }
    if (!validateDateInput()) { document.getElementById('dateYear').focus(); return; }

    const due = getDueDate();
    tasks.push({ id: Date.now(), name, assignee, priority, category, due, done: false });
    render();

    document.getElementById('taskName').value = '';
    document.getElementById('assignee').value = '';
    document.getElementById('priority').value = 'medium';
    clearDateInput();
    document.getElementById('taskName').focus();
  }

  function toggleDone(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; render(); }
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    render();
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.target.closest('.form-card')) addTask();
  });

  initDateInput();
  render();
</script>
</body>
</html>
